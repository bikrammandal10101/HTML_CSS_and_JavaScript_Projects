<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="form-header">
            <h1>✨ Create Account</h1>
            <p>Join us today with @MyTeam</p>
        </div>

        <form id="validationForm" novalidate>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="Enter your full name">
                <div class="error-message">
                    <span class="icon">❌</span>
                    <span class="text"></span>
                </div>
                <div class="success-message">
                    <span class="icon">✅</span>
                    <span class="text">Perfect!</span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email">
                <div class="error-message">
                    <span class="icon">❌</span>
                    <span class="text"></span>
                </div>
                <div class="success-message">
                    <span class="icon">✅</span>
                    <span class="text">Valid email format!</span>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number">
                <div class="error-message">
                    <span class="icon">❌</span>
                    <span class="text"></span>
                </div>
                <div class="success-message">
                    <span class="icon">✅</span>
                    <span class="text">Valid phone number!</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a strong password">
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill"></div>
                    </div>
                    <div class="strength-text"></div>
                </div>
                <div class="error-message">
                    <span class="icon">❌</span>
                    <span class="text"></span>
                </div>
                <div class="success-message">
                    <span class="icon">✅</span>
                    <span class="text">Strong password!</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password">
                <div class="error-message">
                    <span class="icon">❌</span>
                    <span class="text"></span>
                </div>
                <div class="success-message">
                    <span class="icon">✅</span>
                    <span class="text">Passwords match!</span>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span class="btn-text">Create Account</span>
                <div class="loading"></div>
            </button>
        </form>
    </div>

    <div class="success-popup" id="successPopup">
        <span class="icon">🎉</span>
        <span>Account created successfully!</span>
    </div>

    <script src="/script.js"></script>
</body>

</html>
